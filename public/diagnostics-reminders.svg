<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 400" role="img" aria-label="A ringing reminder bell sending notifications on demand, with a clock">
  <rect width="640" height="400" fill="#efe9dd"/>
  <rect x="18" y="18" width="604" height="364" fill="none" stroke="#2a2030" stroke-width="1.5" opacity="0.5"/>

  <!-- small clock, upper area -->
  <g stroke="#2a2030" stroke-width="2.6" fill="#f7f3ea" stroke-linecap="round">
    <circle cx="250" cy="92" r="30"/>
    <line x1="250" y1="92" x2="250" y2="74" fill="none"/>
    <line x1="250" y1="92" x2="266" y2="100" fill="none"/>
    <circle cx="250" cy="92" r="2.6" fill="#2a2030" stroke="none"/>
  </g>

  <!-- the bell -->
  <g stroke="#2a2030" stroke-width="2.8" stroke-linejoin="round" stroke-linecap="round">
    <!-- handle -->
    <path d="M236 168 a16 16 0 0 1 32 0" fill="none"/>
    <!-- body -->
    <path d="M196 300 C 192 248, 198 196, 224 178 C 238 168, 262 168, 276 178 C 302 196, 308 248, 304 300 Z" fill="#f7f3ea"/>
    <!-- rim -->
    <path d="M184 300 q66 22 132 0" fill="#ffffff"/>
    <!-- clapper -->
    <circle cx="250" cy="318" r="11" fill="#cdbfd6"/>
  </g>

  <!-- ringing arcs -->
  <g stroke="#6b5b7a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M170 210 q-22 36 0 72"/>
    <path d="M150 192 q-34 54 0 108"/>
    <path d="M330 210 q22 36 0 72"/>
    <path d="M350 192 q34 54 0 108"/>
  </g>

  <!-- a notification flying out, on demand -->
  <g stroke="#6b5b7a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M404 248 C 440 248, 452 248, 488 248" stroke-dasharray="2 11"/>
    <path d="M482 248 l 14 0 l -7 -7 m 7 7 l -7 7"/>
  </g>
  <g stroke="#2a2030" stroke-width="2.6" stroke-linejoin="round">
    <rect x="448" y="160" width="150" height="92" rx="10" fill="#ffffff"/>
    <circle cx="476" cy="186" r="9" fill="#cdbfd6"/>
    <g stroke-width="3" stroke-linecap="round" opacity="0.6">
      <line x1="496" y1="184" x2="576" y2="184"/>
    </g>
    <g stroke-width="2.6" stroke-linecap="round" opacity="0.5">
      <line x1="470" y1="214" x2="576" y2="214"/>
      <line x1="470" y1="232" x2="548" y2="232"/>
    </g>
  </g>
</svg>
